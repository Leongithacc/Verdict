name: Deploy BIOS guide to GitHub Pages

# Pubblica la cartella site/ (le guide BIOS lette dal telefono via QR) su GitHub Pages.
# URL risultante: https://leongithacc.github.io/Verdict/

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      # Trio Pages PINNATO alle versioni note-buone: con configure-pages@v6 +
      # upload-pages-artifact@v5 + deploy-pages@v5 il servizio Pages rifiuta la
      # deployment ("Deployment failed, try again later", riproducibile 2/2 il
      # 2026-07-03). Dependabot ha una ignore rule per questi tre (dependabot.yml).
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
